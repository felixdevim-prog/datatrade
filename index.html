        function Section({title,sKey,color,children,openSections,toggle}){

            <div style={{background:"#111119",borderRadius:14,border:`1px solid ${isOpen?color:"#1e1e2e"}`,overflow:"hidden",marginBottom:10,transition:".3s"}}>
              <button onClick={()=>toggle(sKey)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:"transparent",border:"none",cursor:"pointer",color:"#e8e8ed",textAlign:"left"}}>

                <span style={{color,fontSize:18,transform:isOpen?"rotate(45deg)":"none",transition:".3s"}}>+</span>
              </button>
              {isOpen && <div style={{padding:"0 16px 16px"}}>{children}</div>}
            </div>
          );
        }

                </button>
                {showResearch&&<div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
                  {RESEARCH.map((r,i)=><ResearchCard key={i} r={r} isOpen={!!openResearch[i]} onToggle={()=>setOpenResearch(p=>({...p,[i]:!p[i]}))}/>)}
                </div>}
              </div>

              <div style={{padding:"10px 16px 6px"}}>
                <button onClick={()=>setShowMarket(!showMarket)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderRadius:14,background:"#111119",border:"1px solid #1e1e2e",cursor:"pointer",color:"#e8e8ed"}}>
                  <div style={{textAlign:"left"}}><div style={{fontSize:15,fontWeight:700}}>📊 Mercado Laboral 2026</div><div style={{fontSize:11,color:"#6b6b80",marginTop:2}}>Datos reales de BLS y WEF</div></div>
                  <span style={{color:"#888",fontSize:18,transform:showMarket?"rotate(45deg)":"none",transition:".3s"}}>+</span>
                </button>
                {showMarket&&<div style={{marginTop:10}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    {JOB_MARKET.stats.map((s,i)=>(
                      <div key={i} style={{background:"#111119",borderRadius:10,padding:"12px",border:`1px solid ${s.color}20`,textAlign:"center"}}>
                        <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.stat}</div>
                        <div style={{fontSize:10,color:"#8090a0",lineHeight:1.4,marginTop:4}}>{s.desc}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"rgba(139,92,246,.06)",border:"1px solid rgba(139,92,246,.15)",borderRadius:10,padding:12}}>
                    <div style={{fontSize:9,fontWeight:700,color:"#a78bfa",letterSpacing:1,marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>STACK REQUERIDO</div>
                    <div style={{fontSize:12,color:"#c4b5fd",lineHeight:1.6}}>{JOB_MARKET.stack}</div>
                  </div>
                </div>}
              </div>

              {/* TABS */}
              <div style={{display:"flex",gap:6,padding:"16px",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
                {PHASES.map((p,i)=>(
                  <button key={p.id} onClick={()=>setActivePhase(i)} style={{
                    flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",
                    padding:"12px 14px",borderRadius:12,minWidth:78,
                    background:i===activePhase?p.dark:"#111119",
                    border:`1.5px solid ${i===activePhase?p.color:"#1e1e2e"}`,
                    cursor:"pointer",color:i===activePhase?p.color:"#6b6b80",transition:".25s"
                  }}>
                    <span style={{fontSize:20,marginBottom:4}}>{p.icon}</span>
                    <span style={{fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>F{p.id}</span>
                  </button>
                ))}
              </div>

              <div style={{padding:"4px 16px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{width:48,height:48,borderRadius:12,background:phase.dark,border:`1.5px solid ${phase.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{phase.icon}</div>
                  <div>
                    <h2 style={{margin:0,fontSize:20,fontWeight:800,letterSpacing:"-0.5px"}}>Fase {phase.id}: {phase.title}</h2>
                    <div style={{fontSize:12,color:phase.color,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{phase.subtitle} · {phase.duration}</div>
                  </div>
                </div>
                <p style={{fontSize:13,color:"#a0a0b0",lineHeight:1.6,margin:"8px 0 0"}}>{phase.description}</p>
              </div>

              <div style={{padding:"0 16px 30px"}}><PhaseView phase={phase}/></div>

              {/* BARRA DE PROGRESO INFERIOR (Sticky) */}
              <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0A0A0F",borderTop:"1px solid #1e1e2e",padding:"16px",display:"flex",alignItems:"center",gap:10,zIndex:100}}>
                <div style={{fontSize:11,color:"#6b6b80",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>F{activePhase+1}/4</div>
                <div style={{flex:1,height:4,background:"#1e1e2e",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:2,width:`${((activePhase+1)/4)*100}%`,background:`linear-gradient(90deg,#06B6D4,${phase.color})`,transition:"width .4s"}}/>
                </div>
                <div style={{fontSize:11,color:phase.color,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{["Fundamentos","Intermedio","Avanzado","Profesional"][activePhase]}</div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UltimateRoadmap />);
    </script>
</body>
</html>
