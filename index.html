<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>English Mastery Roadmap | Luis Felipe Ortiz</title>
  
  <meta name="theme-color" content="#0A0A0F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="English Roadmap">
  
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/felixdevim-prog/datatrade/main/Gemini_Generated_Image_ahwwjahwwjahwwja.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/felixdevim-prog/datatrade/main/Gemini_Generated_Image_ahwwjahwwjahwwja.png">

  <link rel="manifest" href='data:application/manifest+json,{"name":"English Mastery Roadmap","short_name":"English Pro","start_url":".","display":"standalone","background_color":"#0A0A0F","theme_color":"#06B6D4","icons":[{"src":"https://raw.githubusercontent.com/felixdevim-prog/datatrade/main/Gemini_Generated_Image_ahwwjahwwjahwwja.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    body { margin: 0; padding: 0; background: #0A0A0F; -webkit-tap-highlight-color: transparent; }
    * { box-sizing: border-box; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Animación de entrada suave */
    #root { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Constantes de datos (SCIENCE y PHASES se mantienen igual que tu lógica original)
    const SCIENCE = [
      { principle: "Repetición Espaciada", source: "Ebbinghaus (1885)", desc: "Revisar vocabulario en intervalos crecientes triplica la retención.", tool: "4000 Essential Words + Anki" },
      { principle: "Input Comprensible", source: "Krashen (1982)", desc: "Adquieres idioma al entender el 95% del contenido. El resto se absorbe por contexto.", tool: "Busuu + YouTube/Podcasts" },
      { principle: "Retrieval Practice", source: "Roediger (2011)", desc: "Recordar activamente es 3x más efectivo que releer pasivamente.", tool: "Gemini Pro + Anki" },
      { principle: "Interleaving", source: "Lafleur (2020)", desc: "Mezclar skills (listening + speaking) produce aprendizaje más profundo.", tool: "Busuu + Rutina mixta" },
      { principle: "Output Forzado", source: "Swain (1985)", desc: "Hablar te obliga a notar los huecos en tu conocimiento.", tool: "Gemini Pro (Conversación)" },
      { principle: "Filtro Afectivo Bajo", source: "Krashen (1982)", desc: "La IA elimina el miedo al juicio, bajando la ansiedad de aprendizaje.", tool: "Gemini Pro" },
    ];

    const PHASES = [
      {
        id: 1, title: "CIMIENTOS", subtitle: "A2 → A2+", duration: "Meses 1-2", color: "#06B6D4", darkColor: "#083344",
        icon: "🧱", targetVocab: "1,500 palabras", hoursPerDay: "1.5-2 hrs/día",
        description: "Solidificar tu base. Entender el sistema del inglés y construir vocabulario funcional.",
        weeklySchedule: {
          title: "Rutina Diaria",
          blocks: [
            { time: "30 min", activity: "Busuu Premium", detail: "Lecciones A2 + correcciones de la comunidad." },
            { time: "20 min", activity: "4000 Essential Words", detail: "1 unidad (20 palabras) + lectura en voz alta." },
            { time: "15 min", activity: "Anki SRS", detail: "Flashcards con definiciones en inglés únicamente." },
            { time: "20 min", activity: "Listening Pasivo", detail: "Podcasts con transcripción (All Ears English)." },
            { time: "15 min", activity: "Gemini Output", detail: "Conversación simple sobre el tema del día." },
          ]
        },
        milestones: ["Semana 2: Book 1 completado", "Semana 4: Nivel A2 en Busuu", "Semana 8: 800 palabras dominadas"],
        geminiPrompts: [
          { label: "Vocabulary Quiz", prompt: "I learned 20 words. Quiz me with sentences and blanks." },
          { label: "Grammar Detective", prompt: "Analyze my 5 sentences and explain mistakes simply." }
        ],
        resources: ["AnkiWeb", "English Learning for Curious Minds", "YouGlish"]
      },
      {
        id: 2, title: "DESPEGUE", subtitle: "A2+ → B1", duration: "Meses 3-4", color: "#8B5CF6", darkColor: "#2E1065",
        icon: "🚀", targetVocab: "2,500 palabras", hoursPerDay: "2-2.5 hrs/día",
        description: "El gran salto. Pasar de entender palabras sueltas a comunicarte con fluidez básica.",
        weeklySchedule: {
          title: "Rutina B1",
          blocks: [
            { time: "30 min", activity: "Busuu B1", detail: "Enfoque en ejercicios de speaking IA." },
            { time: "40 min", activity: "4000 Words (B3-4)", detail: "Reescribir historias con tus propias palabras." },
            { time: "30 min", activity: "Inmersión YouTube", detail: "Canales técnicos y de trading en inglés." },
            { time: "20 min", activity: "Gemini Workplace", detail: "Simular escenarios de oficina y soporte." },
          ]
        },
        milestones: ["Semana 12: Conversación de 10 min sin pausas", "Semana 16: Nivel B1 certificado"],
        geminiPrompts: [
          { label: "Debate", prompt: "Let's debate: 'Remote work vs Office work'. Use connectors." }
        ],
        resources: ["Rachel's English", "TED Talks", "Write & Improve"]
      },
      {
        id: 3, title: "ACELERACIÓN", subtitle: "B1 → B2", duration: "Meses 5-7", color: "#F59E0B", darkColor: "#451A03",
        icon: "⚡", targetVocab: "3,500 palabras", hoursPerDay: "2-3 hrs/día",
        description: "Nivel profesional. Preparación para trabajar en entornos bilingües y call centers.",
        weeklySchedule: {
          title: "Rutina Business",
          blocks: [
            { time: "30 min", activity: "Busuu B2", detail: "Business English y lecciones corporativas." },
            { time: "30 min", activity: "Sentence Mining", detail: "Crear tarjetas Anki de oraciones reales de podcasts." },
            { time: "40 min", activity: "Gemini Pro", detail: "Entrevistas de trabajo y manejo de clientes difíciles." },
            { time: "30 min", activity: "Deep Listening", detail: "Transcribir segmentos de podcasts avanzados." },
          ]
        },
        milestones: ["Mes 6: Mock interview con Gemini (7/10)", "Mes 7: Explicar conceptos de trading en inglés"],
        geminiPrompts: [
          { label: "Job Interview", prompt: "Act as a Hiring Manager for a Data Analyst position. Interview me." }
        ],
        resources: ["Business English Pod", "The Moth", "Grammarly"]
      },
      {
        id: 4, title: "DOMINIO", subtitle: "B2 → C1", duration: "Meses 8-10", color: "#10B981", darkColor: "#052E16",
        icon: "👑", targetVocab: "4,000+ palabras", hoursPerDay: "2-3 hrs/día",
        description: "Pulido final. El inglés se convierte en tu lengua de trabajo principal.",
        weeklySchedule: {
          title: "Rutina Nativa",
          blocks: [
            { time: "Todo el día", activity: "Inmersión Total", detail: "OS del móvil, PC y redes sociales en inglés." },
            { time: "30 min", activity: "Shadowing", detail: "Imitar tono y ritmo de nativos en TED Talks." },
            { time: "30 min", activity: "Gemini High-Level", detail: "Debatir temas complejos de IA y economía." },
            { time: "30 min", activity: "Professional Writing", detail: "Redacción de reportes y correos técnicos." },
          ]
        },
        milestones: ["Mes 9: Entender 95% de reuniones", "Mes 10: Aplicar a vacantes internacionales"],
        geminiPrompts: [
          { label: "Native Coach", prompt: "Don't simplify your language. Use idioms and sarcasm." }
        ],
        resources: ["EF SET Certificate", "English Shadowing", "Reddit /r/DataScience"]
      }
    ];

    // Componentes UI
    function ScienceCard({ s, isOpen, onToggle }) {
      return (
        <div style={{ background:"#111119", borderRadius:12, border:`1px solid ${isOpen?"#06B6D4":"#1e1e2e"}`, overflow:"hidden", marginBottom:8 }}>
          <button onClick={onToggle} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px", background:"transparent", border:"none", cursor:"pointer", color:"#e8e8ed" }}>
            <div>
              <div style={{ fontSize:14, fontWeight:700 }}>{s.principle}</div>
              <div style={{ fontSize:10, color:"#06B6D4", fontFamily:"'JetBrains Mono',monospace" }}>{s.source}</div>
            </div>
            <span style={{ color:"#06B6D4", fontSize:18 }}>{isOpen?"−":"+"}</span>
          </button>
          {isOpen && <div style={{ padding:"0 14px 14px", fontSize:13, color:"#b0b0b8", lineHeight:1.5 }}>{s.desc}<br/><span style={{color:"#F59E0B", fontSize:11}}>🛠 {s.tool}</span></div>}
        </div>
      );
    }

    function EnglishRoadmap() {
      const [activePhase, setActivePhase] = useState(0);
      const [openScience, setOpenScience] = useState({});
      const phase = PHASES[activePhase];

      return (
        <div style={{ minHeight:"100vh", paddingBottom:80 }}>
          {/* Header con tu Icono Pro */}
          <div style={{ padding:"40px 20px", textAlign:"center", background:"linear-gradient(180deg,#12121A,#0A0A0F)" }}>
            <img src="https://raw.githubusercontent.com/felixdevim-prog/datatrade/main/Gemini_Generated_Image_ahwwjahwwjahwwja.png" 
                 style={{ width:80, height:80, borderRadius:20, marginBottom:15, boxShadow:"0 10px 30px rgba(0,0,0,0.5)" }} 
                 alt="Logo" />
            <div style={{ fontSize:10, letterSpacing:4, color:"#6b6b80", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>LUIS FELIPE ORTIZ SÁNCHEZ</div>
            <h1 style={{ fontSize:28, fontWeight:800, margin:"10px 0 5px" }}>English <span style={{ color:"#06B6D4" }}>Mastery</span></h1>
            <p style={{ fontSize:13, color:"#6b6b80" }}>Roadmap Científico 2026 · A2 a C1</p>
          </div>

          {/* Ciencia */}
          <div style={{ padding:"0 20px" }}>
            <h3 style={{ fontSize:12, color:"#6b6b80", marginBottom:10 }}>CIENCIA DEL APRENDIZAJE</h3>
            {SCIENCE.map((s, i) => (
              <ScienceCard key={i} s={s} isOpen={!!openScience[i]} onToggle={() => setOpenScience(p => ({ ...p, [i]: !p[i] }))} />
            ))}
          </div>

          {/* Navegación Fases */}
          <div className="hide-scrollbar" style={{ display:"flex", gap:10, padding:20, overflowX:"auto" }}>
            {PHASES.map((p, i) => (
              <button key={p.id} onClick={() => setActivePhase(i)} style={{
                flex:"0 0 auto", padding:"15px", borderRadius:15, minWidth:100,
                background: i === activePhase ? p.darkColor : "#111119",
                border: `2px solid ${i === activePhase ? p.color : "#1e1e2e"}`,
                color: i === activePhase ? p.color : "#6b6b80", textAlign:"center"
              }}>
                <div style={{ fontSize:24 }}>{p.icon}</div>
                <div style={{ fontSize:10, fontWeight:800, marginTop:5 }}>FASE {p.id}</div>
              </button>
            ))}
          </div>

          {/* Detalles de Fase */}
          <div style={{ padding:"0 20px" }}>
            <div style={{ background:phase.darkColor, padding:20, borderRadius:20, border:`1px solid ${phase.color}`, marginBottom:20 }}>
              <h2 style={{ margin:0, fontSize:22 }}>{phase.title}</h2>
              <p style={{ fontSize:12, color:phase.color, fontWeight:700 }}>{phase.subtitle} · {phase.duration}</p>
              <p style={{ fontSize:14, color:"#a0a0b0", marginTop:10 }}>{phase.description}</p>
              
              <div style={{ display:"flex", gap:10, marginTop:15 }}>
                <div style={{ flex:1, background:"rgba(0,0,0,0.3)", padding:10, borderRadius:12, textAlign:"center" }}>
                  <div style={{ fontSize:9, color:"#6b6b80" }}>OBJETIVO</div>
                  <div style={{ fontSize:13, fontWeight:700 }}>{phase.targetVocab}</div>
                </div>
                <div style={{ flex:1, background:"rgba(0,0,0,0.3)", padding:10, borderRadius:12, textAlign:"center" }}>
                  <div style={{ fontSize:9, color:"#6b6b80" }}>TIEMPO</div>
                  <div style={{ fontSize:13, fontWeight:700 }}>{phase.hoursPerDay}</div>
                </div>
              </div>
            </div>

            {/* Rutina */}
            <div style={{ background:"#111119", padding:20, borderRadius:20, border:"1px solid #1e1e2e" }}>
              <h3 style={{ fontSize:14, marginBottom:15 }}>📅 {phase.weeklySchedule.title}</h3>
              {phase.weeklySchedule.blocks.map((b, i) => (
                <div key={i} style={{ marginBottom:15, paddingBottom:15, borderBottom: i<phase.weeklySchedule.blocks.length-1?"1px solid #1e1e2e":"none" }}>
                  <div style={{ fontSize:11, color:phase.color, fontWeight:700 }}>{b.time}</div>
                  <div style={{ fontSize:14, fontWeight:700 }}>{b.activity}</div>
                  <div style={{ fontSize:12, color:"#6b6b80" }}>{b.detail}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer Nav */}
          <div style={{ position:"fixed", bottom:0, width:"100%", background:"#0A0A0F", borderTop:"1px solid #1e1e2e", padding:15, textAlign:"center", zIndex:100 }}>
            <div style={{ height:4, background:"#1e1e2e", borderRadius:2, marginBottom:10, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${((activePhase+1)/4)*100}%`, background:phase.color, transition:"0.4s" }} />
            </div>
            <span style={{ fontSize:10, color:"#6b6b80", fontFamily:"'JetBrains Mono',monospace" }}>PROGRESS: {phase.subtitle}</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EnglishRoadmap />);

    // Registrar Service Worker para permitir instalación en Android
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const sw = 'data:application/javascript;base64,c2VsZi.hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IGV2LnJlc3BvbmRXaXRoKGZldGNoKGV2LnJlcXVlc3QpKSk7';
        navigator.serviceWorker.register(`data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IGV2LnJlc3BvbmRXaXRoKGZldGNoKGV2LnJlcXVlc3QpKSk7`);
      });
    }
  </script>
</body>
</html>
